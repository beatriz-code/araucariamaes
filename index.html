    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; }
        
        /* Animações personalizadas para substituir o plugin tailwindcss-animate */
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .animate-slide-down { animation: slideDown 0.3s ease-out forwards; }
        .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
        
        /* Utilitário para ocultar scrollbars */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-[#0a0a0a] text-zinc-300 min-h-screen">

    <div id="app" class="p-4 md:p-8 max-w-7xl mx-auto"></div>

    <script>
        // Dados do Plano de Ação
        let expandedId = 1;
        let plans = [
            {
                id: 1,
                title: "Preparação dos Veículos",
                type: "Atual: 2 | Anterior: 0",
                status: "pending",
                progress: 0,
                iconName: "wrench",
                what: "Estruturar o processo físico de entrada, revisão e estética dos carros.",
                why: "Garantir a qualidade do estoque oferecido ao cliente final e eliminar a falta de controle atual.",
                how: "Implementando os passos obrigatórios de inspeção, higienização e testes para todos os veículos que entram no estoque.",
                steps: [
                    { name: "Inspeção e Mecânica", desc: "Checklist padronizado, revisão de fluidos e troca de itens em fim de vida." },
                    { name: "Higienização", desc: "Lavagem externa e interna profundas, desinfecção e revitalização." },
                    { name: "Testes finais", desc: "Rodar com o carro para atestar silêncio e funcionamento eletrônico." },
                    { name: "Visual", desc: "Exposição em ponto estratégico da loja com precificação e benefícios bem visíveis." }
                ],
                materials: [
                    { title: "Planejamento com Checklist Completo de Avaliação de Veículos", link: "https://app.g30educacao.com.br/m/lessons/27-planejamento-com-checklist-completo-de-avaliacao-de-veiculos-para-compra-1741979960827?classId=2734" },
                    { title: "Ficha de Avaliação dos carros", link: "https://app.g30educacao.com.br/m/lessons/49-ficha-de-avaliacao-dos-carros?classId=2739" }
                ]
            },
            {
                id: 2,
                title: "Rotinas de Pós Vendas",
                type: "Atual: 2 | Anterior: 0",
                status: "in-progress",
                progress: 35,
                iconName: "handshake",
                what: "Criar um fluxo ativo e padronizado de contato e suporte após a entrega do veículo.",
                why: "Aumentar a satisfação do cliente, prevenir crises, garantir resolução rápida e gerar provas sociais.",
                how: "Acompanhando o cliente de perto nas primeiras 48h, oferecendo canais rápidos de suporte e mantendo relacionamento contínuo.",
                steps: [
                    { name: "Follow-up", desc: "Ligar em 48h para atestar satisfação e tirar dúvidas do novo motorista." },
                    { name: "Suporte e NPS", desc: "Ter canal exclusivo rápido (WhatsApp) e rodar pesquisa NPS rotineiramente." },
                    { name: "Prova Social", desc: "Solicitar e gravar ativamente depoimentos (em vídeo ou áudio/texto) de todos os clientes para uso no marketing." },
                    { name: "Garantias", desc: "Orientação documental blindada e resolução instantânea para não virar queixa pública." },
                    { name: "Comunidade", desc: "Ofertar serviços extras (seguros, lavagem) e mandar mensagens em datas festivas." }
                ],
                materials: []
            },
            {
                id: 3,
                title: "Otimização de Marketing, Tráfego e Funil",
                type: "Lacuna Estratégica",
                status: "pending",
                progress: 0,
                iconName: "trending-up",
                what: "Aumentar o volume de produção de conteúdo orgânico e estruturar anúncios para compra de estoque e lives.",
                why: "A frequência atual (3x/semana) é insuficiente. O tráfego pago atual traz leads desqualificados e há lacuna total (nota 0) em anúncios de compra.",
                how: "Aumentando o volume focado em conversão, usando provas sociais do pós-venda e criando campanhas de captação de estoque.",
                steps: [
                    { name: "Conteúdo de Conversão", desc: "Aumentar o volume de postagens focado em financiamentos, taxas e carros mais vendidos." },
                    { name: "Prova Social em Vídeo", desc: "Utilizar as respostas positivas e depoimentos do pós-venda (Plano 2) como autoridade em vídeos." },
                    { name: "Tráfego para Captação", desc: "Criar campanhas de tráfego pago específicas com o objetivo de captar veículos para abastecer o estoque." },
                    { name: "Funis de Venda e Lives", desc: "Iniciar a estruturação de anúncios e processos voltados para eventos de compras e vendas via lives." }
                ],
                materials: [],
                scheduleTitle: "SISTEMA DE 7 COM RESULTADOS CONSISTENTES",
                schedule: [
                    { day: "Segunda", content: "VÍDEOS DE VENDA", qty: "2x" },
                    { day: "Terça", content: "VÍDEOS DO DIA A DIA", qty: "3x" },
                    { day: "Quarta", content: "CARROSSEL DE FOTOS", qty: "1x" },
                    { day: "Quinta", content: "PROVA SOCIAL", qty: "3x" },
                    { day: "Sexta", content: "REELS DE NEGOCIAÇÕES AO VIVO", qty: "3x" },
                    { day: "Sábado", content: "FUNIL DE LIVE COM IA", qty: "" },
                    { day: "Domingo", content: "TENDÊNCIAS / MEME / COMPRA", qty: "" }
                ],
                videoRules: [
                    { text: "Conteúdo: Dia a Dia / Negociações / Apresentação ao Vivo", highlight: false, gold: false },
                    { text: "Diretriz: Evitar Olhar para a Câmera", highlight: true, gold: false },
                    { text: "Formato: Vídeos REELS (Mínimo 1 min de duração)", highlight: false, gold: false },
                    { text: "Meta Mínima: 5 Vídeos / Dia", highlight: true, gold: false },
                    { text: "META IDEAL: 10 a 15 Vídeos / Dia", highlight: true, gold: true }
                ]
            }
        ];

        // Configuração de Status
        function getStatusConfig(status) {
            switch (status) {
                case 'completed': return { icon: 'check-circle-2', text: 'Concluído', color: 'text-[#cfa861]', bg: 'bg-[#cfa861]/10', border: 'border-[#cfa861]/30' };
                case 'in-progress': return { icon: 'clock', text: 'Em Andamento', color: 'text-amber-400', bg: 'bg-amber-400/10', border: 'border-amber-400/30' };
                default: return { icon: 'alert-circle', text: 'Pendente', color: 'text-zinc-400', bg: 'bg-zinc-800/50', border: 'border-zinc-700' };
            }
        }

        // Ações Globais
        window.toggleExpand = function(id) {
            expandedId = expandedId === id ? null : id;
            render();
        };

        window.updateStatus = function(event, id, newStatus) {
            event.stopPropagation();
            plans = plans.map(p => {
                if (p.id === id) {
                    let progress = p.progress;
                    if (newStatus === 'completed') progress = 100;
                    else if (newStatus === 'pending') progress = 0;
                    else if (newStatus === 'in-progress' && progress === 0) progress = 50;
                    return { ...p, status: newStatus, progress };
                }
                return p;
            });
            render();
        };

        // Renderização Principal
        function render() {
            const totalCompleted = plans.filter(p => p.status === 'completed').length;
            const totalInProgress = plans.filter(p => p.status === 'in-progress').length;
            const totalPending = plans.filter(p => p.status === 'pending').length;
            const overallProgress = Math.round(plans.reduce((acc, curr) => acc + curr.progress, 0) / plans.length);

            const appDiv = document.getElementById('app');
            
            let html = `
                <!-- Header Visual Lions -->
                <header class="mb-8 bg-gradient-to-b from-[#1a1a1a] to-[#0d0d0d] rounded-2xl p-6 md:p-8 shadow-2xl relative overflow-hidden border border-[#cfa861]/20">
                    <div class="absolute top-0 right-0 w-96 h-96 bg-[#cfa861] rounded-full opacity-10 -mr-20 -mt-20 blur-[100px]"></div>
                    
                    <div class="relative z-10">
                        <div class="flex items-center gap-3 mb-2">
                            <i data-lucide="crown" class="h-6 w-6 text-[#cfa861]"></i>
                            <span class="text-[#cfa861] tracking-[0.2em] text-sm font-bold uppercase">Lions Car Club</span>
                        </div>
                        <h1 class="text-3xl md:text-5xl font-black text-white tracking-wider flex items-center gap-3 uppercase">
                            Plano de Ação <span class="font-light text-[#cfa861]">| Asturias</span>
                        </h1>
                        <p class="text-zinc-400 mt-3 text-lg font-medium tracking-wide uppercase text-sm">Foco do Acompanhamento: Gestão do Negócio e Pessoas</p>
                    </div>
                </header>

                <!-- KPI Cards -->
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
                    <div class="bg-[#141414] rounded-xl shadow-lg border border-[#cfa861]/20 p-5 flex flex-col justify-between hover:border-[#cfa861]/50 transition-colors">
                        <div class="flex justify-between items-start mb-2">
                            <span class="text-zinc-400 font-bold uppercase text-xs tracking-widest">Performance</span>
                            <i data-lucide="target" class="h-5 w-5 text-[#cfa861]"></i>
                        </div>
                        <div class="flex items-end gap-2">
                            <span class="text-3xl font-black text-white">${overallProgress}%</span>
                        </div>
                        <div class="w-full bg-zinc-800 h-1.5 rounded-full mt-3 overflow-hidden">
                            <div class="bg-[#cfa861] h-full transition-all duration-500 shadow-[0_0_10px_rgba(207,168,97,0.5)]" style="width: ${overallProgress}%"></div>
                        </div>
                    </div>

                    <div class="bg-[#141414] rounded-xl shadow-lg border border-zinc-800 p-5 flex flex-col justify-between hover:border-zinc-600 transition-colors">
                        <div class="flex justify-between items-start mb-2">
                            <span class="text-zinc-400 font-bold uppercase text-xs tracking-widest">Pendentes</span>
                            <i data-lucide="alert-circle" class="h-5 w-5 text-zinc-500"></i>
                        </div>
                        <span class="text-3xl font-black text-white">${totalPending}</span>
                        <span class="text-xs text-zinc-500 mt-1 uppercase tracking-wide">Ações não iniciadas</span>
                    </div>

                    <div class="bg-[#141414] rounded-xl shadow-lg border border-zinc-800 p-5 flex flex-col justify-between hover:border-amber-400/50 transition-colors">
                        <div class="flex justify-between items-start mb-2">
                            <span class="text-zinc-400 font-bold uppercase text-xs tracking-widest">Constância</span>
                            <i data-lucide="clock" class="h-5 w-5 text-amber-400"></i>
                        </div>
                        <span class="text-3xl font-black text-white">${totalInProgress}</span>
                        <span class="text-xs text-zinc-500 mt-1 uppercase tracking-wide">Sendo executadas</span>
                    </div>

                    <div class="bg-[#141414] rounded-xl shadow-lg border border-zinc-800 p-5 flex flex-col justify-between hover:border-[#cfa861]/50 transition-colors">
                        <div class="flex justify-between items-start mb-2">
                            <span class="text-zinc-400 font-bold uppercase text-xs tracking-widest">Disciplina</span>
                            <i data-lucide="check-circle-2" class="h-5 w-5 text-[#cfa861]"></i>
                        </div>
                        <span class="text-3xl font-black text-white">${totalCompleted}</span>
                        <span class="text-xs text-zinc-500 mt-1 uppercase tracking-wide">Metas atingidas</span>
                    </div>
                </div>

                <!-- Lista de Planos -->
                <div class="space-y-6">
                    
                    <!-- Banner de Prioridade -->
                    <div class="flex flex-col sm:flex-row sm:items-center gap-4 mb-6 bg-red-950/30 border border-red-900/50 border-l-4 border-l-red-600 rounded-r-xl p-5 shadow-lg">
                        <div class="bg-red-950/50 p-3 rounded-full text-red-500 border border-red-900">
                            <i data-lucide="alert-triangle" class="h-8 w-8"></i>
                        </div>
                        <div>
                            <h2 class="text-xl font-black text-white flex items-center gap-2 uppercase tracking-wide">
                                Foco Prioritário: Operacional & Marketing
                            </h2>
                            <p class="text-red-400 font-bold mt-1 uppercase text-xs tracking-widest">Missão Lions • Planos de Ação Imediata</p>
                        </div>
                    </div>
            `;

            plans.forEach(plan => {
                const isExpanded = expandedId === plan.id;
                const statusConfig = getStatusConfig(plan.status);

                html += `
                    <div class="bg-[#141414] rounded-xl shadow-lg border ${isExpanded ? 'border-[#cfa861]/50 ring-1 ring-[#cfa861]/20' : 'border-zinc-800'} overflow-hidden transition-all duration-300">
                        
                        <!-- Card Header (Clickable) -->
                        <div onclick="toggleExpand(${plan.id})" class="p-5 md:p-6 cursor-pointer flex flex-col md:flex-row md:items-center justify-between gap-4 hover:bg-[#1a1a1a] transition-colors ${isExpanded ? 'bg-gradient-to-r from-[#1a1a1a] to-[#141414]' : ''}">
                            <div class="flex items-start gap-4">
                                <div class="p-3 rounded-lg bg-[#cfa861]/10 text-[#cfa861] border border-[#cfa861]/20">
                                    <i data-lucide="${plan.iconName}" class="h-6 w-6"></i>
                                </div>
                                <div>
                                    <div class="flex items-center gap-3 flex-wrap mb-1.5">
                                        <h3 class="font-black text-lg text-white leading-tight uppercase tracking-wide">PLANO ${plan.id}: ${plan.title}</h3>
                                        <span class="text-[10px] px-2.5 py-1 rounded border border-zinc-700 bg-zinc-900 text-zinc-300 uppercase tracking-widest font-bold">
                                            ${plan
